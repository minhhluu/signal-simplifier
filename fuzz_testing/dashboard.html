<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSP Fuzzer Dashboard</title>
<style>
  :root {
    --bg: #0e0f14; --bg2: #161821; --bg3: #1e2030;
    --border: #2a2d3e; --text: #cdd6f4; --muted: #6c7086;
    --pass: #a6e3a1; --fail: #f38ba8; --warn: #fab387; --info: #89b4fa;
    --purple: #cba6f7; --yellow: #f9e2af;
    --font: 'JetBrains Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font);
         font-size: 13px; min-height: 100vh; }
  header { background: var(--bg2); border-bottom: 1px solid var(--border);
            padding: 16px 28px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -.3px; }
  header h1 span { color: var(--info); }
  .badge { background: var(--bg3); border: 1px solid var(--border);
           border-radius: 6px; padding: 3px 10px; font-size: 11px; color: var(--muted); }
  main { padding: 24px 28px; display: grid; gap: 24px;
         grid-template-columns: 1fr 1fr 1fr; }
  .full { grid-column: 1 / -1; }
  .two  { grid-column: span 2; }

  /* Cards */
  .card { background: var(--bg2); border: 1px solid var(--border);
          border-radius: 10px; padding: 18px 20px; }
  .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: .8px;
                color: var(--muted); margin-bottom: 14px; }

  /* Stat pills */
  .stats-grid { display: flex; flex-wrap: wrap; gap: 12px; }
  .stat { background: var(--bg3); border: 1px solid var(--border);
          border-radius: 8px; padding: 14px 18px; flex: 1; min-width: 110px; }
  .stat-val { font-size: 28px; font-weight: 700; line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .c-pass { color: var(--pass); } .c-fail { color: var(--fail); }
  .c-warn { color: var(--warn); } .c-info { color: var(--info); }
  .c-purple { color: var(--purple); }

  /* Bar chart */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-label { width: 90px; text-align: right; color: var(--muted); font-size: 11px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 10px; background: var(--bg3); border-radius: 5px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 5px; transition: width .6s ease; }
  .bar-count { width: 36px; color: var(--muted); font-size: 11px; }

  /* Log table */
  .log-wrap { max-height: 380px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { position: sticky; top: 0; background: var(--bg2); color: var(--muted);
       font-size: 10px; text-transform: uppercase; letter-spacing: .6px;
       padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 6px 10px; border-bottom: 1px solid var(--border);
       font-size: 11px; vertical-align: middle; }
  tr:hover td { background: var(--bg3); }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 4px;
          font-size: 10px; font-weight: 600; }
  .pill-PASS       { background: #1e3a2a; color: var(--pass); }
  .pill-FAIL, .pill-ENGINE_FAIL, .pill-EQUIV_FAIL, .pill-SV_FAIL
                   { background: #3a1e22; color: var(--fail); }
  .pill-NUMERIC_FAIL { background: #3a2e1a; color: var(--warn); }
  .expr { color: var(--yellow); max-width: 260px; overflow: hidden;
          text-overflow: ellipsis; white-space: nowrap; }

  /* Drop zone */
  #drop { border: 2px dashed var(--border); border-radius: 10px; padding: 32px;
          text-align: center; color: var(--muted); cursor: pointer;
          transition: border-color .2s; }
  #drop:hover, #drop.over { border-color: var(--info); color: var(--info); }
  #drop input { display: none; }
  #placeholder { grid-column: 1 / -1; }

  /* Coverage donut placeholder */
  canvas { display: block; margin: 0 auto; }
</style>
</head>
<body>
<header>
  <h1>DSP <span>Fuzzer</span> Dashboard</h1>
  <span class="badge" id="run-ts">—</span>
  <span class="badge" id="run-info">No data loaded</span>
</header>

<main id="main">
  <div id="placeholder" class="full">
    <label id="drop">
      <input type="file" id="file-in" accept=".jsonl,.json">
      <div style="font-size:28px;margin-bottom:10px">📂</div>
      Drop your <code>fuzz_*.jsonl</code> or <code>--out report.json</code> here
      <div style="margin-top:8px;font-size:11px">or click to browse</div>
    </label>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);
const COLORS = { PASS:'#a6e3a1', NUMERIC_FAIL:'#fab387', ENGINE_FAIL:'#f38ba8',
                 SV_FAIL:'#f38ba8', EQUIV_FAIL:'#cba6f7' };
const OP_COLORS = ['#89b4fa','#cba6f7','#a6e3a1','#fab387','#f38ba8','#f9e2af','#74c7ec','#94e2d5'];

let records = [];

// ── File handling ──────────────────────────────────────────────
$('drop').addEventListener('click', () => $('file-in').click());
$('drop').addEventListener('dragover', e => { e.preventDefault(); $('drop').classList.add('over'); });
$('drop').addEventListener('dragleave', () => $('drop').classList.remove('over'));
$('drop').addEventListener('drop', e => {
  e.preventDefault(); $('drop').classList.remove('over');
  loadFile(e.dataTransfer.files[0]);
});
$('file-in').addEventListener('change', e => loadFile(e.target.files[0]));

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => parseData(e.target.result, file.name);
  reader.readAsText(file);
}

function parseData(text, fname) {
  try {
    // Try JSON report first
    const parsed = JSON.parse(text);
    if (parsed.stats && parsed.failures !== undefined) {
      renderReport(parsed, fname);
      return;
    }
  } catch(_) {}
  // JSONL
  records = text.trim().split('\n').filter(Boolean).map(l => JSON.parse(l));
  renderFromRecords(records, fname);
}

// ── Render from pre-summarised JSON report ─────────────────────
function renderReport(report, fname) {
  records = report.failures || [];
  const stats = report.stats;
  const total = stats.total || 1;
  $('run-info').textContent = `${total} tests • ${report.elapsed_s ?? '?'}s`;
  $('run-ts').textContent = fname;
  buildUI(stats, report.coverage?.ops ?? {}, records);
}

// ── Render from raw JSONL ──────────────────────────────────────
function renderFromRecords(recs, fname) {
  const stats = { total: recs.length, PASS: 0, NUMERIC_FAIL: 0,
                  ENGINE_FAIL: 0, SV_FAIL: 0, EQUIV_FAIL: 0 };
  const opCounts = {};
  recs.forEach(r => {
    stats[r.status] = (stats[r.status] ?? 0) + 1;
    (r.op_trace || []).forEach(op => opCounts[op] = (opCounts[op] ?? 0) + 1);
  });
  $('run-info').textContent = `${recs.length} tests`;
  $('run-ts').textContent = fname;
  buildUI(stats, opCounts, recs.filter(r => r.status !== 'PASS'));
}

// ── Main UI builder ────────────────────────────────────────────
function buildUI(stats, opCounts, failures) {
  const m = $('main');
  m.innerHTML = '';

  // Stat pills
  const statsEl = document.createElement('div');
  statsEl.className = 'full card';
  statsEl.innerHTML = `<div class="card-title">Run Summary</div><div class="stats-grid">
    ${pill('total', stats.total ?? 0, 'c-info', 'Total')}
    ${pill('pass',  stats.PASS ?? 0, 'c-pass', 'Pass')}
    ${pill('nfail', stats.NUMERIC_FAIL ?? 0, 'c-warn', 'Numeric fail')}
    ${pill('efail', stats.ENGINE_FAIL ?? 0, 'c-fail', 'Engine fail')}
    ${pill('sfail', stats.SV_FAIL ?? 0, 'c-fail', 'SV fail')}
    ${pill('qfail', stats.EQUIV_FAIL ?? 0, 'c-purple', 'Equiv fail')}
  </div>`;
  m.appendChild(statsEl);

  // Pass rate donut
  const donutCard = document.createElement('div');
  donutCard.className = 'card';
  donutCard.innerHTML = `<div class="card-title">Pass Rate</div><canvas id="donut" width="160" height="160"></canvas>`;
  m.appendChild(donutCard);
  setTimeout(() => drawDonut(stats), 50);

  // Op coverage bar chart
  const covCard = document.createElement('div');
  covCard.className = 'two card';
  const maxOp = Math.max(...Object.values(opCounts), 1);
  covCard.innerHTML = `<div class="card-title">Operator Coverage</div>` +
    Object.entries(opCounts).sort((a,b) => b[1]-a[1]).map(([op, cnt], i) =>
      `<div class="bar-row">
        <div class="bar-label">${op}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${cnt/maxOp*100}%;background:${OP_COLORS[i%OP_COLORS.length]}"></div></div>
        <div class="bar-count">${cnt}</div>
      </div>`
    ).join('');
  m.appendChild(covCard);

  // Failures table
  const failCard = document.createElement('div');
  failCard.className = 'full card';
  failCard.innerHTML = `<div class="card-title">Failures &amp; Anomalies (${failures.length})</div>
    <div class="log-wrap">
    <table><thead><tr>
      <th>Seed</th><th>Status</th><th>Expression</th><th>Depth</th><th>Error</th><th>ms</th>
    </tr></thead><tbody>
      ${failures.length ? failures.map(r => `<tr>
        <td>${r.seed}</td>
        <td><span class="pill pill-${r.status}">${r.status}</span></td>
        <td class="expr" title="${escHtml(r.expr_str)}">${escHtml(r.expr_str)}</td>
        <td>${r.depth ?? '—'}</td>
        <td style="color:var(--fail);max-width:200px;overflow:hidden;text-overflow:ellipsis">${escHtml(r.error ?? '')}</td>
        <td>${r.elapsed_ms ?? '—'}</td>
      </tr>`).join('') : '<tr><td colspan="6" style="color:var(--pass);text-align:center">No failures</td></tr>'}
    </tbody></table></div>`;
  m.appendChild(failCard);
}

function pill(id, val, cls, label) {
  return `<div class="stat"><div class="stat-val ${cls}">${val}</div><div class="stat-lbl">${label}</div></div>`;
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function drawDonut(stats) {
  const canvas = $('donut'); if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const total = stats.total || 1;
  const slices = [
    { val: stats.PASS ?? 0,          color: '#a6e3a1' },
    { val: stats.NUMERIC_FAIL ?? 0,  color: '#fab387' },
    { val: stats.ENGINE_FAIL ?? 0,   color: '#f38ba8' },
    { val: stats.SV_FAIL ?? 0,       color: '#cba6f7' },
    { val: stats.EQUIV_FAIL ?? 0,    color: '#f9e2af' },
  ].filter(s => s.val > 0);
  const cx = 80, cy = 80, r = 60, ri = 38;
  let angle = -Math.PI / 2;
  slices.forEach(s => {
    const sweep = (s.val / total) * 2 * Math.PI;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx, cy, r, angle, angle + sweep);
    ctx.closePath(); ctx.fillStyle = s.color; ctx.fill();
    angle += sweep;
  });
  ctx.beginPath(); ctx.arc(cx, cy, ri, 0, 2*Math.PI);
  ctx.fillStyle = '#161821'; ctx.fill();
  const pct = Math.round((stats.PASS ?? 0) / total * 100);
  ctx.fillStyle = '#cdd6f4'; ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(pct + '%', cx, cy);
}
</script>
</body>
</html>
